<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Visa Form Filler</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🛂 E-Visa Form Filler</h1>
      <p class="subtitle">Iraq Electronic Visa System</p>
    </header>

    <div id="setup-required" class="section hidden">
      <div class="warning">
        <span class="icon">⚠️</span>
        <p>API URL not configured. <a href="#" id="open-settings">Open Settings</a></p>
      </div>
    </div>

    <div id="main-content" class="section">
      <div class="form-group">
        <label for="group-select">Select Group</label>
        <select id="group-select">
          <option value="">-- Select a group --</option>
        </select>
      </div>

      <div class="form-group">
        <label for="status-filter">Filter by Status</label>
        <select id="status-filter">
          <option value="all">All Passengers</option>
          <option value="pending">🔴 Pending Only</option>
          <option value="done">🟢 Done Only</option>
        </select>
      </div>

      <div id="group-progress" class="progress-bar hidden">
        <div class="progress-label">
          <span>Progress:</span>
          <span id="progress-text">0/0</span>
        </div>
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <div class="form-group">
        <label for="passport-select">Select Passenger</label>
        <select id="passport-select" disabled>
          <option value="">-- Select a passenger --</option>
        </select>
      </div>

      <div id="passenger-preview" class="preview hidden">
        <h3>Selected Passenger</h3>
        <div class="preview-content">
          <div class="preview-row">
            <span class="label">Name:</span>
            <span id="preview-name" class="value"></span>
          </div>
          <div class="preview-row">
            <span class="label">Passport:</span>
            <span id="preview-passport" class="value mono"></span>
          </div>
          <div class="preview-row">
            <span class="label">Nationality:</span>
            <span id="preview-nationality" class="value"></span>
          </div>
          <div class="preview-row">
            <span class="label">Images:</span>
            <span id="preview-images" class="value"></span>
          </div>
          <div class="preview-row">
            <span class="label">Visa Status:</span>
            <span id="preview-status" class="value status-badge"></span>
          </div>
        </div>
      </div>

      <div class="actions">
        <button id="fill-form-btn" class="btn btn-primary" disabled>
          <span class="btn-icon">✏️</span>
          Fill Form
        </button>
        <button id="upload-images-btn" class="btn btn-secondary" disabled>
          <span class="btn-icon">📤</span>
          Upload Images
        </button>
      </div>
      
      <div class="actions" style="margin-top: 8px;">
        <button id="mark-done-btn" class="btn btn-success" disabled>
          <span class="btn-icon">✓</span>
          Mark as Done
        </button>
      </div>

      <div id="status" class="status hidden"></div>
    </div>

    <footer>
      <a href="#" id="settings-link">⚙️ Settings</a>
      <span class="version">v1.0.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
